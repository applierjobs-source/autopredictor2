<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kalshi Climate Trade Bot</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 40px;
        color: #111;
      }
      .container {
        max-width: 760px;
      }
      button {
        padding: 12px 18px;
        font-size: 16px;
        cursor: pointer;
      }
      .status {
        margin-top: 20px;
        padding: 12px;
        border: 1px solid #ddd;
        border-radius: 8px;
        background: #fafafa;
        white-space: pre-wrap;
      }
      table.status {
        width: 100%;
        border-collapse: collapse;
        margin-top: 12px;
      }
      table.status th,
      table.status td {
        padding: 8px;
        border-bottom: 1px solid #e5e5e5;
        text-align: left;
        vertical-align: top;
      }
      table.status th {
        font-weight: 600;
      }
      .secondary {
        background: #f2f4f7;
      }
      .muted {
        color: #666;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Kalshi Climate Trade Bot</h1>
      <p class="muted">
        Trades every daily climate event using Weather Company data and an
        OpenAI decision.
      </p>
      <div>
        <button id="runButton">Run climate trades ($20 each)</button>
      </div>
      <div class="status" id="status">Waiting for trade...</div>

      <h2>Daily Climate Events</h2>
      <p class="muted">
        These events are pulled from Kalshi's daily climate category.
      </p>
      <button id="refreshEvents">Refresh list</button>
      <div class="status" id="eventsStatus">Loading events...</div>
      <table class="status" id="eventsTable">
        <thead>
          <tr>
            <th>Event</th>
            <th>Close</th>
            <th>Title</th>
            <th>Markets</th>
          </tr>
        </thead>
        <tbody id="eventsBody"></tbody>
      </table>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
